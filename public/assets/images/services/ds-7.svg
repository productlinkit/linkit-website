<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 820" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#18181b"/><stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="62%">
      <stop offset="0" stop-color="#f87171" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#f87171" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#f87171" stop-opacity="0.45"/>
    </linearGradient>
  </defs>

  <rect width="600" height="820" fill="url(#bg)"/>
  <ellipse cx="300" cy="250" rx="360" ry="300" fill="url(#glow)"/>

  <!-- floating chips -->
  <g stroke="#fff" stroke-opacity="0.22" fill="#fff" fill-opacity="0.07">
    <rect x="78" y="206" width="78" height="78" rx="20"/>
    <rect x="440" y="150" width="96" height="58" rx="18"/>
    <rect x="452" y="560" width="84" height="84" rx="22"/>
    <rect x="64" y="600" width="120" height="46" rx="16"/>
  </g>

  <!-- phone mockup -->
  <g>
    <rect x="176" y="150" width="248" height="520" rx="40" fill="url(#glass)" stroke="#fff" stroke-opacity="0.30" stroke-width="1.6"/>
    <rect x="270" y="172" width="60" height="8" rx="4" fill="#fff" fill-opacity="0.35"/>

    <!-- hero card with icon -->
    <rect x="200" y="200" width="200" height="190" rx="24" fill="url(#hero)" stroke="#fff" stroke-opacity="0.22"/>
    <g transform="translate(268 263) scale(1.05)" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M32 13 L49 20 V33 C49 43 41 49 32 51 C23 49 15 43 15 33 V20 Z"/><path d="M25 32 L30 37 L40 26"/>
    </g>

    <!-- list rows -->
    <g fill="#fff" fill-opacity="0.10">
      <rect x="200" y="410" width="200" height="46" rx="12"/>
      <rect x="200" y="468" width="200" height="46" rx="12"/>
    </g>
    <g fill="#fff" fill-opacity="0.5">
      <circle cx="224" cy="433" r="11"/><circle cx="224" cy="491" r="11"/>
    </g>
    <g fill="#fff" fill-opacity="0.22">
      <rect x="246" y="426" width="120" height="7" rx="3.5"/>
      <rect x="246" y="439" width="74" height="6" rx="3"/>
      <rect x="246" y="484" width="120" height="7" rx="3.5"/>
      <rect x="246" y="497" width="74" height="6" rx="3"/>
    </g>

    <!-- bottom action bar -->
    <rect x="200" y="540" width="200" height="48" rx="24" fill="#fff" fill-opacity="0.85"/>
    <rect x="262" y="560" width="76" height="8" rx="4" fill="#b91c1c" fill-opacity="0.9"/>
  </g>
</svg>
